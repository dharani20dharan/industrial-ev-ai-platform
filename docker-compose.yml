services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto_broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infrastructure/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - ev-network

  kafka:
      image: bitnamilegacy/kafka:latest
      container_name: kafka_broker
      ports:
        - "9092:9092"
      environment:
        - KAFKA_CFG_NODE_ID=1
        - KAFKA_CFG_PROCESS_ROLES=broker,controller
        - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
        - KAFKA_CFG_LISTENERS=INTERNAL://:9095,EXTERNAL://:9092,CONTROLLER://:9093
        - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka:9095,EXTERNAL://localhost:9092
        - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
        - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
        - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      networks:
        - ev-network

  kafka-setup:
      image: bitnamilegacy/kafka:latest
      container_name: kafka_setup
      depends_on:
        - kafka
      networks:
        - ev-network
      command: >
        bash -c "
          echo 'Waiting for Kafka to be ready...'
          until kafka-topics.sh --bootstrap-server kafka:9095 --list 2>/dev/null; do
            echo 'Kafka is not ready yet, waiting 5 seconds...'
            sleep 5
          done
          echo 'Kafka is online! Provisioning topics...'
          kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9095 --topic telemetry.raw --partitions 3
          kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9095 --topic telemetry.processed --partitions 3
          kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9095 --topic predictions --partitions 2
          kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9095 --topic alerts --partitions 2
          kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9095 --topic maintenance --partitions 2
          kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9095 --topic supplychain --partitions 2
          kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9095 --topic sustainability --partitions 1
          echo 'Topics created successfully.'
        "

  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: timescaledb
    environment:
      - POSTGRES_USER=ev_admin
      - POSTGRES_PASSWORD=ev_password
      - POSTGRES_DB=ev_platform
    ports:
      - "5432:5432"
    volumes:
      - ./infrastructure/timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ev-network

  neo4j:
    image: neo4j:5
    container_name: neo4j_db
    environment:
      - NEO4J_AUTH=neo4j/ev_password
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - ev-network

networks:
  ev-network:
    driver: bridge
